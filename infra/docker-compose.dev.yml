version: "3.9"

# Development override — mounts source for hot reload on both services

services:
  mongodb:
    image: mongo:7
    container_name: ghana_tax_mongo_dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_DATABASE: ghana_tax_db
    networks:
      - ghana_tax_net_dev

  redis:
    image: redis:7-alpine
    container_name: ghana_tax_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ghana_tax_net_dev

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: ghana_tax_backend_dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "True"
    depends_on:
      - mongodb
      - redis
    networks:
      - ghana_tax_net_dev
    volumes:
      - ../backend:/app
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: ghana_tax_frontend_dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - ghana_tax_net_dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  mongo_data_dev:

networks:
  ghana_tax_net_dev:
    driver: bridge
