version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: ghana_tax_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_DATABASE: ghana_tax_db
    networks:
      - ghana_tax_net

  redis:
    image: redis:7-alpine
    container_name: ghana_tax_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ghana_tax_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ghana_tax_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    networks:
      - ghana_tax_net
    volumes:
      - ../backend:/app
    command: >
      sh -c "python manage.py migrate --run-syncdb &&
             python manage.py seed_demo_data &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ghana_tax_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ghana_tax_net

volumes:
  mongo_data:

networks:
  ghana_tax_net:
    driver: bridge
